<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — College Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/forgot_password.css">
</head>

<body>

    <div class="card" id="mainCard">

        <!-- STEP 1: VERIFY IDENTITY -->
        <div id="step1" class="step-container">
            <div class="card-header">
                <div class="card-title">Reset Password 🔐</div>
                <div class="card-subtitle">Verify your identity using your security question</div>
            </div>

            <div class="input-wrap">
                <label>Roll Number <span class="required-asterisk">*</span></label>
                <input type="text" id="roll_no" placeholder="e.g. CSE2024001"
                    onkeydown="if(event.key==='Enter') verifyIdentity()">
            </div>

            <div class="input-wrap">
                <label>First Name <span class="required-asterisk">*</span></label>
                <input type="text" id="first_name" placeholder="Rahul" autocomplete="given-name"
                    onkeydown="if(event.key==='Enter') verifyIdentity()">
            </div>

            <div class="input-wrap">
                <label>Security Question <span class="required-asterisk">*</span></label>
                <select id="security_question">
                    <option value="">-- Select a Question --</option>
                    <option value="What is your favorite teacher's name?">What is your favorite teacher's name?</option>
                    <option value="What is your hometown?">What is your hometown?</option>
                    <option value="What was your first school name?">What was your first school name?</option>
                </select>
            </div>

            <div class="input-wrap">
                <label>Security Answer <span class="required-asterisk">*</span></label>
                <input type="text" id="security_answer" placeholder="Your Answer"
                    onkeydown="if(event.key==='Enter') verifyIdentity()">
            </div>

            <button class="btn-primary" id="btnVerify" onclick="verifyIdentity()">
                Verify Identity 🚀
            </button>

            <div id="errorText1" class="error-text"></div>

            <a href="./login.html" class="back-link">← Back to Login</a>
        </div>


        <!-- STEP 2: CREATE NEW PASSWORD -->
        <div id="step2" class="step-container">
            <div class="card-header">
                <div class="card-title">Create New Password ✨</div>
                <div class="card-subtitle">Identity verified. Enter your new secure password.</div>
            </div>

            <div class="input-wrap">
                <label>New Password <span class="required-asterisk">*</span></label>
                <input type="password" id="new_password" placeholder="Min. 6 characters"
                    onkeydown="if(event.key==='Enter') resetPassword()">
                <span class="eye" onclick="togglePass('new_password', this)">👁️</span>
            </div>

            <div class="input-wrap">
                <label>Confirm Password <span class="required-asterisk">*</span></label>
                <input type="password" id="confirm_password" placeholder="Repeat your password"
                    onkeydown="if(event.key==='Enter') resetPassword()">
                <span class="eye" onclick="togglePass('confirm_password', this)">👁️</span>
            </div>

            <button class="btn-primary" id="btnReset" onclick="resetPassword()">
                Save Password 💾
            </button>

            <div id="errorText2" class="error-text"></div>
        </div>


        <!-- STEP 3: SUCCESS (Replaces step2) -->
        <div id="step3" class="result-box">
            <div class="result-icon">✅</div>
            <div class="result-title">Password Reset!</div>
            <div class="result-desc">Your password has been updated securely. You can now use it to log into your
                account.</div>
            <a href="./login.html" class="btn-primary"
                style="display:inline-block; text-decoration:none; margin-top:24px;">Go to Login →</a>
        </div>

    </div>

    <script>
        function togglePass(id, btn) {
            const inp = document.getElementById(id);
            const hidden = inp.type === 'password';
            inp.type = hidden ? 'text' : 'password';
            btn.textContent = hidden ? '🙈' : '👁️';
        }

        async function verifyIdentity() {
            const roll_no = document.getElementById('roll_no').value.trim();
            const first_name = document.getElementById('first_name').value.trim();
            const security_question = document.getElementById('security_question').value;
            const security_answer = document.getElementById('security_answer').value.trim();
            const btn = document.getElementById('btnVerify');
            const errorText = document.getElementById('errorText1');

            if (!roll_no || !first_name || !security_question || !security_answer) {
                errorText.textContent = "Please fill out all required fields.";
                errorText.style.display = "block";
                return;
            }

            btn.disabled = true;
            btn.textContent = "Verifying...";
            errorText.style.display = "none";

            try {
                const fd = new FormData();
                fd.append('roll_no', roll_no);
                fd.append('first_name', first_name);
                fd.append('security_question', security_question);
                fd.append('security_answer', security_answer);

                const res = await fetch('./api/verify_security_answer.php', { method: 'POST', body: fd });
                const data = await res.json();

                btn.disabled = false;
                btn.textContent = "Verify Identity 🚀";

                if (data.success) {
                    // Transition to step 2
                    document.getElementById('mainCard').classList.add('show-step2');
                } else {
                    errorText.textContent = data.message || "Verification failed.";
                    errorText.style.display = "block";
                }
            } catch (err) {
                btn.disabled = false;
                btn.textContent = "Verify Identity 🚀";
                errorText.textContent = "Network error. Please try again.";
                errorText.style.display = "block";
            }
        }

        async function resetPassword() {
            const password = document.getElementById('new_password').value;
            const confirm = document.getElementById('confirm_password').value;
            const btn = document.getElementById('btnReset');
            const errorText = document.getElementById('errorText2');

            if (!password || !confirm) {
                errorText.textContent = "Please enter and confirm your new password.";
                errorText.style.display = "block";
                return;
            }
            if (password.length < 6) {
                errorText.textContent = "Password must be at least 6 characters.";
                errorText.style.display = "block";
                return;
            }
            if (password !== confirm) {
                errorText.textContent = "Passwords do not match.";
                errorText.style.display = "block";
                return;
            }

            btn.disabled = true;
            btn.textContent = "Saving...";
            errorText.style.display = "none";

            try {
                const fd = new FormData();
                fd.append('password', password);
                fd.append('confirm_password', confirm);

                const res = await fetch('./api/reset_password.php', { method: 'POST', body: fd });
                const data = await res.json();

                if (data.success) {
                    // Show success box
                    document.getElementById('step2').style.display = 'none';
                    document.getElementById('step3').style.display = 'block';
                } else {
                    btn.disabled = false;
                    btn.textContent = "Save Password 💾";
                    errorText.textContent = data.message || "Failed to reset password.";
                    errorText.style.display = "block";
                }
            } catch (e) {
                btn.disabled = false;
                btn.textContent = "Save Password 💾";
                errorText.textContent = "Network error. Please try again.";
                errorText.style.display = "block";
            }
        }
    </script>
</body>

</html>
