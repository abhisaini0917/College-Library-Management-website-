<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/login.css">
</head>

<body>



  <!-- LOGIN CARD -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">Welcome Back 👋</div>
    </div>

    <!-- Tabs -->
    <div class="tabs" role="tablist">
      <button class="tab active" onclick="switchTab('student')" id="tab-student" role="tab">
        <span class="tab-icon">🎓</span> Student
      </button>
      <button class="tab" onclick="switchTab('admin')" id="tab-admin" role="tab">
        <span class="tab-icon">🏫</span> Admin
      </button>
    </div>

    <!-- Student Panel -->
    <div class="panel active" id="panel-student">
      <div class="field">
        <label>Email Address</label>
        <div class="input-wrap">
          <input type="email" placeholder="you@school.edu" id="s-email"
            onkeydown="if(event.key==='Enter') this.closest('.panel').querySelector('.btn-primary').click()">
          <span class="input-icon">✉️</span>
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <input type="password" placeholder="••••••••" id="s-pass"
            onkeydown="if(event.key==='Enter') this.closest('.panel').querySelector('.btn-primary').click()">
          <span class="input-icon" onclick="togglePass('s-pass', this)" title="Show/hide">👁️</span>
        </div>
      </div>
      <div class="remember-row">
        <label class="check-label">
          <input type="checkbox" checked> Remember Me
        </label>
        <a href="./forgot_password.html" target="_top"
          style="font-size:13px;color:var(--blue);font-weight:700;text-decoration:none;">Forgot Password?</a>
      </div>
      <button class="btn-primary" onclick="handleLogin(this, 'Student')">Login as Student</button>
      <div class="card-footer">
        Don't have an account? <a onclick="window.top.location.href='./register.html'">Create Account →</a>
      </div>
    </div>

    <!-- Admin Panel -->
    <div class="panel" id="panel-admin">
      <div class="field">
        <label>Admin Email</label>
        <div class="input-wrap">
          <input type="email" placeholder="admin@school.edu" id="a-email"
            onkeydown="if(event.key==='Enter') this.closest('.panel').querySelector('.btn-primary').click()">
          <span class="input-icon">🔐</span>
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <input type="password" placeholder="••••••••" id="a-pass"
            onkeydown="if(event.key==='Enter') this.closest('.panel').querySelector('.btn-primary').click()">
          <span class="input-icon" onclick="togglePass('a-pass', this)" title="Show/hide">👁️</span>
        </div>
      </div>
      <div class="remember-row">
        <label class="check-label">
          <input type="checkbox"> Keep me signed in
        </label>
        <a href="#" style="font-size:13px;color:var(--blue);font-weight:700;text-decoration:none;">Forgot Password?</a>
      </div>
      <button class="btn-primary" onclick="handleLogin(this, 'Admin')">Login as Admin</button>
    </div>

    <!-- Create Account Panel -->
    <div class="panel" id="panel-register" style="display: none;">
      <div class="row-2">
        <div class="field">
          <label>First Name</label>
          <div class="input-wrap">
            <input type="text" placeholder="Abhishek">
          </div>
        </div>
        <div class="field">
          <label>Last Name</label>
          <div class="input-wrap">
            <input type="text" placeholder="Kumar">
          </div>
        </div>
      </div>
      <div class="field">
        <label>Email Address</label>
        <div class="input-wrap">
          <input type="email" placeholder="you@school.edu">
          <span class="input-icon">✉️</span>
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <input type="password" placeholder="Create a strong password" id="r-pass" oninput="checkStrength(this.value)">
          <span class="input-icon" onclick="togglePass('r-pass', this)">👁️</span>
        </div>
        <div class="strength-bar">
          <span id="sb1"></span><span id="sb2"></span><span id="sb3"></span><span id="sb4"></span>
        </div>
        <div class="strength-label" id="strength-label">Enter a password</div>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <div class="input-wrap">
          <input type="password" placeholder="Repeat your password">
        </div>
      </div>
      <div class="field">
        <label>I am a...</label>
        <div style="display:flex;gap:10px;">
          <label
            style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;font-weight:700;color:var(--muted);">
            <input type="radio" name="role" value="student" checked style="accent-color:var(--blue);"> Student
          </label>
          <label
            style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;font-weight:700;color:var(--muted);">
            <input type="radio" name="role" value="teacher" style="accent-color:var(--blue);"> Teacher
          </label>
          <label
            style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;font-weight:700;color:var(--muted);">
            <input type="radio" name="role" value="parent" style="accent-color:var(--blue);"> Parent
          </label>
        </div>
      </div>
      <button class="btn-primary" onclick="handleLogin(this, 'Creating account')">Create My Account 🚀</button>

      <div class="divider">or sign up with</div>
      <div class="socials">
        <button class="btn-social">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              fill="#4285F4" />
            <path
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              fill="#34A853" />
            <path
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
              fill="#FBBC05" />
            <path
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              fill="#EA4335" />
          </svg>
          Google
        </button>
        <button class="btn-social">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2">
            <path
              d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
          </svg>
          Facebook
        </button>
      </div>
      <p class="terms">By signing up, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy
          Policy</a></p>
      <div class="card-footer" style="margin-top:12px;">
        Already have an account? <a onclick="switchTab('student')">Sign in →</a>
      </div>
    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script>
    function switchTab(name) {
      ['student', 'admin'].forEach(t => {
        document.getElementById('tab-' + t).classList.toggle('active', t === name);
        document.getElementById('panel-' + t).classList.toggle('active', t === name);
      });
      // Update card title
      const titles = { student: 'Welcome Back 👋', admin: 'Admin Access 🔐' };
      document.querySelector('.card-title').textContent = titles[name];
    }

    function showCreateAccount() {
      const t = document.getElementById('toast');
      t.textContent = '📝 Redirecting to account creation page...';
      t.classList.add('show');
      setTimeout(() => {
        t.classList.remove('show');
        // window.location.href = '/create-account'; // Uncomment and update with your page URL
      }, 2000);
    }

    function togglePass(id, btn) {
      const inp = document.getElementById(id);
      const isHidden = inp.type === 'password';
      inp.type = isHidden ? 'text' : 'password';
      btn.textContent = isHidden ? '🙈' : '👁️';
    }

    function checkStrength(val) {
      const bars = [document.getElementById('sb1'), document.getElementById('sb2'), document.getElementById('sb3'), document.getElementById('sb4')];
      const label = document.getElementById('strength-label');
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const colors = ['#ef4444', '#f97316', '#eab308', '#22c55e'];
      const labels = ['Weak', 'Fair', 'Good', 'Strong'];
      bars.forEach((b, i) => {
        b.style.background = i < score ? colors[score - 1] : '#e2e8f0';
      });
      label.textContent = val.length === 0 ? 'Enter a password' : (labels[score - 1] || 'Weak');
      label.style.color = val.length === 0 ? '#94a3b8' : colors[Math.max(0, score - 1)];
    }

    function handleLogin(btn, role) {
      // Ripple effect
      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      ripple.style.width = ripple.style.height = '100px';
      ripple.style.left = '50%';
      ripple.style.top = '50%';
      btn.appendChild(ripple);
      setTimeout(() => ripple.remove(), 700);

      const t = document.getElementById('toast');

      // Determine which panel is active and pick the right inputs + API endpoint
      const isAdmin = role === 'Admin';
      const emailId = isAdmin ? 'a-email' : 's-email';
      const passId = isAdmin ? 'a-pass' : 's-pass';
      const endpoint = isAdmin ? './api/login_admin.php' : './api/login_student.php';

      const email = document.getElementById(emailId).value.trim();
      const password = document.getElementById(passId).value;

      // Basic client-side check before hitting the server
      if (!email || !password) {
        t.textContent = '⚠️ Please enter your email and password.';
        t.style.background = '#f97316';
        t.classList.add('show');
        setTimeout(() => { t.classList.remove('show'); t.style.background = ''; }, 3000);
        return;
      }

      // Disable button while request is in flight
      btn.disabled = true;
      btn.textContent = 'Logging in…';

      const formData = new FormData();
      formData.append('email', email);
      formData.append('password', password);

      fetch(endpoint, { method: 'POST', body: formData })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            t.textContent = `✅ ${role} logged in successfully!`;
            t.style.background = '';
            t.classList.add('show');
            setTimeout(() => {
              t.classList.remove('show');
              if (data.data && data.data.redirect) {
                window.top.location.href = data.data.redirect;
              }
            }, 1500);
          } else {
            t.textContent = '❌ ' + (data.message || 'Invalid credentials.');
            t.style.background = '#ef4444';
            t.classList.add('show');
            setTimeout(() => { t.classList.remove('show'); t.style.background = ''; }, 3500);
            btn.disabled = false;
            btn.textContent = isAdmin ? 'Login as Admin' : 'Login as Student';
          }
        })
        .catch(() => {
          t.textContent = '❌ Network error. Please try again.';
          t.style.background = '#ef4444';
          t.classList.add('show');
          setTimeout(() => { t.classList.remove('show'); t.style.background = ''; }, 3500);
          btn.disabled = false;
          btn.textContent = isAdmin ? 'Login as Admin' : 'Login as Student';
        });
    }
  </script>
</body>

</html>
